# ─────────────────────────────────────────────────────────────
# Nginx config — mirrors Replit proxy routing:
#   /api/v1/*  → Python FastAPI  (port 8000)
#   /api/*     → Bun API server  (port 8080)
#   /*         → Python FastAPI  (port 8000)
# ─────────────────────────────────────────────────────────────

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout combined;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Upstream backends
    upstream python_api {
        server python-api:8000;
        keepalive 32;
    }

    upstream bun_api {
        server bun-api:8080;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;

        # ── /api/v1/* → Python FastAPI ───────────────────────
        location /api/v1/ {
            proxy_pass         http://python_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── /api/* → Bun metadata server ─────────────────────
        location /api/ {
            proxy_pass         http://bun_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # ── /* → Python FastAPI (catch-all) ──────────────────
        location / {
            proxy_pass         http://python_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
