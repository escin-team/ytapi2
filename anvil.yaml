db_schema:
  files:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      client_hidden: false
      name: path
      type: string
    - admin_ui: {order: 1, width: 200}
      client_hidden: false
      name: file
      type: media
    - admin_ui: {order: 2, width: 200}
      client_hidden: false
      name: file_version
      type: string
    indexes: []
    server: full
    title: Files
native_deps:
  head_html: |2

    <style>
      .anvil-panel-section-container { padding: 0 15px; }
    </style>
runtime_options:
  client_version: '2'
  server_spec: {base: python310-minimal}
  server_version: python3-sandbox
  version: 2
services:
- client_config: {enable_v2: true}
  server_config: {}
  source: /runtime/services/tables.yml
- client_config: {}
  server_config: {file_table: files}
  source: /runtime/services/anvil/files.yml
